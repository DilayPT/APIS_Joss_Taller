<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="galeria.css">
</head>
<body>
    <header class="header text-center">
        <h1 class="header-title">GALERÍA</h1>
        <p class="text-muted">Colección de imágenes dinámicas</p>
    </header>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <p class="fotos-count m-0">Total: <span id="fotos-count">0</span></p>
            <div>
                <button class="btn btn-sm btn-outline-info" id="cargar-mas-btn">Añadir 10</button>
                <button class="btn btn-sm btn-outline-danger" id="limpiar-btn">Limpiar</button>
            </div>
        </div>
        <div class="galeria-grid" id="galeria"></div>
    </div>

    <script type="module" src="galeria.js"></script>
</body>
</html>
